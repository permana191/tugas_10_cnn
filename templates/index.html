<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detector | UNIBBA FTI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="bg-shapes"><div class="shape shape1"></div><div class="shape shape2"></div></div>

    <div class="glass-panel">
        <h2>CNN Neural Core</h2>
        <p>Pilih metode input untuk mendeteksi emosi wajah.</p>

        <div class="tab-container">
            <button class="tab-btn active" id="tab-upload" onclick="switchTab('upload')"><i class="fa-solid fa-file-arrow-up"></i> Unggah File</button>
            <button class="tab-btn" id="tab-camera" onclick="switchTab('camera')"><i class="fa-solid fa-camera"></i> Gunakan Kamera</button>
        </div>

        <form action="/" method="POST" enctype="multipart/form-data" id="upload-form">
            
            <div id="section-upload">
                <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span id="file-name">Klik atau Drag & Drop Foto Kesini</span>
                    <small>Mendukung JPG, PNG, JPEG</small>
                    <input type="file" name="file" id="file-input" accept="image/*">
                </div>
            </div>

            <div id="section-camera" style="display: none;">
                <div class="camera-wrapper" style="position: relative;">
                    <video id="webcam" autoplay playsinline style="width: 100%; border-radius: 15px; border: 2px solid #00d2ff;"></video>
                    
                    <canvas id="tracking-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none;"></canvas>
                    
                    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                        <button type="button" id="start-tracking-btn" class="btn-back" style="font-size: 12px; padding: 10px;"><i class="fa-solid fa-eye"></i> Live Tracking</button>
                        <button type="button" id="capture-btn" class="btn-submit" style="font-size: 12px; padding: 10px; width: auto;"><i class="fa-solid fa-camera"></i> Jepret Hasil</button>
                    </div>
                </div>
                
                <canvas id="canvas" style="display: none;"></canvas>
                <input type="hidden" name="webcam_image" id="webcam-input">
            </div>
            
            <div id="preview-container">
                <button type="button" id="remove-btn" onclick="removeImage()"><i class="fa-solid fa-xmark"></i></button>
                <img id="image-preview" src="" alt="Preview">
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">Mulai Analisis AI</span>
            </button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
